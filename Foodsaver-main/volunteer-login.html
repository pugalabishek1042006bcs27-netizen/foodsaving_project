<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodSaver - Volunteer Registration / Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80")
          no-repeat center center fixed;
        background-size: cover;
        margin: 0;
        padding: 0;
      }
      .navbar {
        background-color: #e63946;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }
      .navbar .logo {
        font-weight: bold;
        font-size: 1.2em;
      }
      .navbar .links a {
        color: white;
        margin-left: 15px;
        text-decoration: none;
        font-weight: bold;
      }
      .form-container {
        display: flex;
        justify-content: center;
        padding: 50px 20px;
      }
      .form-box {
        background-color: white;
        padding: 30px;
        max-width: 450px;
        width: 100%;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      }
      h2 {
        text-align: center;
        color: #007b5e;
        margin-bottom: 20px;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
      }
      #registerBtn {
        background-color: #28a745;
        color: white;
      }
      #loginBtn {
        background-color: #218838;
        color: white;
      }
      #message {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="logo">FoodSaver</div>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>

    <div class="form-container">
      <div class="form-box">
        <h2 id="formTitle">Volunteer Registration</h2>

        <!-- Registration Form -->
        <form id="registerForm" onsubmit="return false;">
          <input type="text" id="fullName" placeholder="Full Name" required />
          <input
            type="tel"
            id="phone"
            placeholder="Phone Number"
            maxlength="10"
            required
          />
          <input
            type="email"
            id="emailReg"
            placeholder="Email Address"
            required
          />
          <input
            type="password"
            id="passwordReg"
            placeholder="Password"
            required
          />
          <textarea id="address" placeholder="Address" required></textarea>
          <input type="text" id="city" placeholder="City" required />
          <input
            type="text"
            id="availability"
            placeholder="Availability (e.g., 9AM - 5PM)"
            required
          />
          <button id="registerBtn" onclick="register()">Register</button>
          <p style="text-align: center">
            Already have an account?
            <a href="#" onclick="toggleForm('login')">Login</a>
          </p>
        </form>

        <!-- Login Form -->
        <form id="loginForm" style="display: none" onsubmit="return false;">
          <input
            type="email"
            id="emailLogin"
            placeholder="Email Address"
            required
          />
          <input
            type="password"
            id="passwordLogin"
            placeholder="Password"
            required
          />
          <button id="loginBtn" onclick="login()">Login</button>
          <p style="text-align: center">
            New here? <a href="#" onclick="toggleForm('register')">Register</a>
          </p>
        </form>

        <div id="message"></div>
      </div>
    </div>

    <script>
      const messageDiv = document.getElementById("message");

      function showMessage(text, type) {
        messageDiv.innerText = text;
        messageDiv.className = type;
      }

      function toggleForm(type) {
        const registerForm = document.getElementById("registerForm");
        const loginForm = document.getElementById("loginForm");
        const title = document.getElementById("formTitle");

        if (type === "login") {
          registerForm.style.display = "none";
          loginForm.style.display = "block";
          title.innerText = "Volunteer Login";
        } else {
          loginForm.style.display = "none";
          registerForm.style.display = "block";
          title.innerText = "Volunteer Registration";
        }
      }

      // Volunteer Registration
      function register() {
        const fullName = document.getElementById("fullName").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const email = document.getElementById("emailReg").value.trim();
        const password = document.getElementById("passwordReg").value.trim();
        const address = document.getElementById("address").value.trim();
        const city = document.getElementById("city").value.trim();
        const availability = document
          .getElementById("availability")
          .value.trim();

        if (
          !fullName ||
          !phone ||
          !email ||
          !password ||
          !address ||
          !city ||
          !availability
        ) {
          showMessage("❌ All fields are required.", "error");
          return;
        }

        // Combine Address + City into Region
        const region = `${address}, ${city}`;

        fetch("volunteer-register.php", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `name=${encodeURIComponent(
            fullName
          )}&contact_number=${encodeURIComponent(
            phone
          )}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(
            password
          )}&region=${encodeURIComponent(
            region
          )}&availability=${encodeURIComponent(availability)}`,
        })
          .then((res) => res.text())
          .then((data) => {
            if (data.trim() === "success") {
              showMessage("✅ Registration Successful!", "success");
              document.getElementById("registerForm").reset();
              toggleForm("login");
            } else {
              showMessage("❌ " + data, "error");
            }
          })
          .catch((err) => showMessage("❌ Server error: " + err, "error"));
      }

      // Volunteer Login
      function login() {
        const email = document.getElementById("emailLogin").value.trim();
        const password = document.getElementById("passwordLogin").value.trim();

        if (!email || !password) {
          showMessage("❌ Please enter email and password", "error");
          return;
        }

        fetch("volunteer-login.php", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `email=${encodeURIComponent(
            email
          )}&password=${encodeURIComponent(password)}`,
        })
          .then((res) => res.text())
          .then((data) => {
            if (data.trim() === "success") {
              showMessage("✅ Login successful! Redirecting...", "success");
              setTimeout(() => {
                window.location.href = "volunteer-dashboard.php";
              }, 1500);
            } else {
              showMessage("❌ " + data, "error");
            }
          })
          .catch((err) => showMessage("❌ Server error: " + err, "error"));
      }
    </script>
  </body>
</html>
