<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodSaver - Admin Login</title>
    <style>
      /* --- Global --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1950&q=80")
          no-repeat center center/cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      /* --- Overlay for depth --- */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(4px);
      }

      /* --- Login Box --- */
      .login-box {
        position: relative;
        z-index: 2;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 16px;
        padding: 40px 35px;
        width: 350px;
        color: white;
        text-align: center;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        animation: fadeIn 1s ease-in-out;
      }

      .login-box h2 {
        font-size: 2em;
        color: #fff;
        font-weight: 700;
        margin-bottom: 25px;
      }

      .login-box input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
      }

      .login-box input::placeholder {
        color: #f5f5f5;
      }

      .login-box input:focus {
        background: rgba(255, 255, 255, 0.35);
        box-shadow: 0 0 0 2px #2ecc71;
      }

      .login-box button {
        background: linear-gradient(135deg, #28a745, #218838);
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
        margin-top: 10px;
      }

      .login-box button:hover {
        background: linear-gradient(135deg, #2ecc71, #239a4d);
        transform: translateY(-2px);
      }

      /* --- Floating logo --- */
      .logo {
        font-size: 40px;
        margin-bottom: 15px;
        animation: float 3s ease-in-out infinite;
      }

      /* --- Message --- */
      .msg {
        margin-top: 12px;
        font-weight: 500;
        font-size: 14px;
      }

      /* --- Animations --- */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      /* --- Responsive --- */
      @media (max-width: 500px) {
        .login-box {
          width: 90%;
          padding: 30px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <div class="logo">🍽️</div>
      <h2>Admin Login</h2>
      <form id="adminForm" onsubmit="return false;">
        <input type="email" id="email" placeholder="Admin Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button onclick="login()">Login</button>
        <div id="msg" class="msg"></div>
      </form>
    </div>

    <script>
      function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");

        fetch("admin-login.php", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `email=${encodeURIComponent(
            email
          )}&password=${encodeURIComponent(password)}`,
        })
          .then((res) => res.text())
          .then((data) => {
            if (data.trim() === "success") {
              msg.style.color = "#00ff88";
              msg.innerText = "✅ Login successful! Redirecting...";
              setTimeout(() => (window.location.href = "admin-main.php"), 1200);
            } else {
              msg.style.color = "#ff4d4d";
              msg.innerText = "❌ " + data;
            }
          })
          .catch(() => {
            msg.style.color = "#ffcc00";
            msg.innerText = "⚠️ Network Error. Try again.";
          });
      }
    </script>
  </body>
</html>
