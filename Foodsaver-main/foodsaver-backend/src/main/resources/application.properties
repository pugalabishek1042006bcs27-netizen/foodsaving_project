spring.application.name=foodsaver
server.port=8080

spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=foodsaver

jwt.secret=foodsaverSuperSecretKey2024MinimumLengthForHS256AlgorithmMustBe32Chars
jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

file.upload-dir=./uploads
spring.web.resources.static-locations=file:./uploads/,classpath:/static/

razorpay.key-id=rzp_test_xxxxxxxxxxxx
razorpay.key-secret=your_secret_here
