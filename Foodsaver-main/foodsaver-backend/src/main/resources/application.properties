spring.application.name=foodsaver
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/foodsaver?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=foodsaverSuperSecretKey2024MinimumLengthForHS256AlgorithmMustBe32Chars
jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

file.upload-dir=./uploads
spring.web.resources.static-locations=file:./uploads/,classpath:/static/
