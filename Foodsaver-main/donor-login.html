  <body>
    <div class="navbar">

    <div class="form-container">
      <div class="form-box">
        <h2 id="formTitle">Donor Registration</h2>

        <!-- Registration Form -->
        <form id="registerForm" onsubmit="return false;">
          <input type="text" id="fullName" placeholder="Full Name" required />
          <input
            type="tel"
            id="phone"
            placeholder="Phone Number"
            required
            maxlength="10"
          />
          <input
            type="email"
            id="emailReg"
            placeholder="Email Address"
            required
          />
          <input
            type="password"
            id="passwordReg"
            placeholder="Password"
            required
          />
          <input
            type="text"
            id="street"
            placeholder="Street Address"
            required
          />
          <div style="display: flex; gap: 10px">
            <input type="text" id="city" placeholder="City" required />
            <input type="text" id="state" placeholder="State" required />
            <input type="text" id="zip" placeholder="ZIP Code" required />
          </div>
          <button id="registerBtn" onclick="register()">Register</button>
          <p style="text-align: center">
            Already have an account?
            <a href="#" onclick="toggleForm('login')">Login</a>
          </p>
        </form>

        <!-- Login Form -->
        <form id="loginForm" style="display: none" onsubmit="return false;">
          <input
            type="email"
            id="emailLogin"
            placeholder="Email Address"
            required
          />
          <input
            type="password"
            id="passwordLogin"
            placeholder="Password"
            required
          />
          <button id="loginBtn" onclick="login()">Login</button>
          <p style="text-align: center">
            New here? <a href="#" onclick="toggleForm('register')">Register</a>
          </p>
        </form>

        <div id="message"></div>
      </div>
    </div>

    <script>
      const messageDiv = document.getElementById("message");

      function showMessage(text, type) {
        messageDiv.innerText = text;
        messageDiv.className = type;
      }

      function toggleForm(type) {
        const reg = document.getElementById("registerForm");
        const log = document.getElementById("loginForm");
        const title = document.getElementById("formTitle");
        if (type === "login") {
          reg.style.display = "none";
          log.style.display = "block";
          title.innerText = "Donor Login";
        } else {
          log.style.display = "none";
          reg.style.display = "block";
          title.innerText = "Donor Registration";
        }
      }

      function register() {
        const data = {
          name: document.getElementById("fullName").value,
          contact_number: document.getElementById("phone").value,
          email: document.getElementById("emailReg").value,
          password: document.getElementById("passwordReg").value,
          address: `${document.getElementById("street").value}, ${
            document.getElementById("city").value
          }, ${document.getElementById("state").value}, ${
            document.getElementById("zip").value
          }`,
        };

        if (
          !data.name ||
          !data.contact_number ||
          !data.email ||
          !data.password
        ) {
          showMessage("❗ Fill all required fields", "error");
          return;
        }

        fetch("donor-register.php", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams(data),
        })
          .then((res) => res.text())
          .then((res) => {
            if (res.trim() === "success") {
              showMessage(
                "✅ Registration successful! Please login.",
                "success"
              );
              toggleForm("login");
            } else showMessage("❌ " + res, "error");
          });
      }

      function login() {
        const email = document.getElementById("emailLogin").value.trim();
        const password = document.getElementById("passwordLogin").value.trim();

        if (!email || !password) {
          showMessage("❗ Enter email and password", "error");
          return;
        }

        fetch("donor-login-process.php", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `email=${encodeURIComponent(
            email
          )}&password=${encodeURIComponent(password)}`,
        })
          .then((res) => res.text())
          .then((data) => {
            if (data.trim() === "success") {
              showMessage("✅ Login successful! Redirecting...", "success");
              setTimeout(
                () => (window.location.href = "donor-dashboard.php"),
                1500
              );
            } else showMessage("❌ " + data, "error");
          });
      }
    </script>
  </body>
