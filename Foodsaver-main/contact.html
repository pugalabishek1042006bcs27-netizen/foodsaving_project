<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - FoodSavr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="gradient-bg min-h-screen">
    <!-- Navigation -->
    <nav
      class="bg-white bg-opacity-90 backdrop-blur-sm shadow-lg fixed w-full top-0 z-50"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center">
            <h1 class="text-2xl font-bold text-purple-600">🍽️ FoodSavr</h1>
          </div>
          <div class="flex items-center space-x-6">
            <a
              href="index.html"
              class="nav-link text-gray-700 hover:text-purple-600 font-medium"
              >Home</a
            >
            <a
              href="about.html"
              class="nav-link text-gray-700 hover:text-purple-600 font-medium"
              >About</a
            >
            <a
              href="services.html"
              class="nav-link text-gray-700 hover:text-purple-600 font-medium"
              >Services</a
            >
            <a href="contact.html" class="nav-link text-purple-600 font-medium"
              >Contact</a
            >
            <div class="relative group">
              <button
                class="flex items-center space-x-2 bg-purple-600 text-white px-4 py-2 rounded-full"
              >
                <span>👤</span><span>Login</span>
              </button>
              <div
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 hidden group-hover:block"
              >
                <a
                  href="donor-login.html"
                  class="block px-4 py-2 hover:bg-purple-50"
                  >Login as Donor</a
                >
                <a
                  href="volunteer-login.html"
                  class="block px-4 py-2 hover:bg-purple-50"
                  >Login as Volunteer</a
                >
                <a
                  href="receiver-login.html"
                  class="block px-4 py-2 hover:bg-purple-50"
                  >Login as Receiver</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Contact Section -->
    <div class="pt-24 pb-16 px-4 text-white">
      <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8">
        <!-- Form -->
        <div
          class="bg-white bg-opacity-20 backdrop-blur-sm rounded-2xl p-8 shadow-xl"
        >
          <h2 class="text-3xl font-bold mb-6 text-center">📩 Get in Touch</h2>
          <form id="contactForm" class="space-y-4">
            <div>
              <label class="block text-sm mb-2 font-medium">Name</label>
              <input
                type="text"
                name="name"
                class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                placeholder="Your Name"
                required
              />
            </div>
            <div>
              <label class="block text-sm mb-2 font-medium">Email</label>
              <input
                type="email"
                name="email"
                class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                placeholder="you@email.com"
                required
              />
            </div>
            <div>
              <label class="block text-sm mb-2 font-medium">Message</label>
              <textarea
                name="message"
                rows="4"
                class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                placeholder="Your message..."
                required
              ></textarea>
            </div>
            <button
              type="submit"
              class="w-full bg-white text-purple-600 py-3 rounded-lg font-semibold hover:bg-opacity-90 transition"
            >
              Send Message
            </button>
            <p id="formStatus" class="text-center text-sm mt-3"></p>
          </form>
        </div>

        <!-- Info -->
        <div
          class="bg-white bg-opacity-20 backdrop-blur-sm rounded-2xl p-8 shadow-xl"
        >
          <h2 class="text-3xl font-bold mb-6 text-center">
            📞 Contact Information
          </h2>
          <ul class="space-y-4 text-lg">
            <li>📍 123 Community Street, Food City</li>
            <li>📞 +91 9043952146</li>
            <li>✉️ foodsaver77@gmail.com</li>
            <li>🕒 Available 24/7</li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      // AJAX form submission
      document
        .getElementById("contactForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          const response = await fetch("contact-submit.php", {
            method: "POST",
            body: formData,
          });
          const result = await response.text();
          document.getElementById("formStatus").textContent = result;
          document.getElementById("formStatus").classList.add("text-green-300");
          this.reset();
        });
    </script>
  </body>
</html>
